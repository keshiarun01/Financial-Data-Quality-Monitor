x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 30
    # App database connection
    APP_DB_HOST: postgres
    APP_DB_PORT: 5432
    APP_DB_NAME: ${APP_DB_NAME:-financial_dq}
    APP_DB_USER: ${APP_DB_USER:-app_user}
    APP_DB_PASSWORD: ${APP_DB_PASSWORD:-app_password}
    # API keys
    FRED_API_KEY: ${FRED_API_KEY:-}
    ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./great_expectations:/opt/airflow/great_expectations
    - ./scripts:/opt/airflow/scripts
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - fdqm-network

services:
  # ──────────────────────────────────────────────
  # PostgreSQL — shared by Airflow + App
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fdqm-network

  # ──────────────────────────────────────────────
  # Airflow Init — run migrations + create admin
  # ──────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin
        echo "Airflow init complete."
    restart: "no"

  # ──────────────────────────────────────────────
  # Airflow Webserver
  # ──────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    environment:
      <<: *airflow-env
      # Fix Gunicorn timeout for resource-constrained environments
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: 300
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: 300
      AIRFLOW__WEBSERVER__WORKERS: 2
      AIRFLOW__WEBSERVER__WORKER_REFRESH_INTERVAL: 6000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 10
      start_period: 120s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ──────────────────────────────────────────────
  # Airflow Scheduler
  # ──────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname $(hostname) || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 10
      start_period: 120s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ──────────────────────────────────────────────
  # App DB Init — create app tables + seed data
  # ──────────────────────────────────────────────
  app-db-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Waiting for app database..."
        python -c "
        import time, psycopg2
        for i in range(30):
            try:
                conn = psycopg2.connect(host='postgres', port=5432, dbname='financial_dq', user='app_user', password='app_password')
                conn.close()
                print('App DB is ready!')
                break
            except:
                time.sleep(2)
        "
        echo "Running init_db.py..."
        cd /opt/airflow && python scripts/init_db.py
        echo "App DB init complete."
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Streamlit Dashboard
  # ──────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    ports:
      - "8501:8501"
    environment:
      APP_DB_HOST: postgres
      APP_DB_PORT: 5432
      APP_DB_NAME: ${APP_DB_NAME:-financial_dq}
      APP_DB_USER: ${APP_DB_USER:-app_user}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-app_password}
    volumes:
      - ./streamlit_app:/app/streamlit_app
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fdqm-network

volumes:
  postgres-data:
  airflow-logs:

networks:
  fdqm-network:
    driver: bridge